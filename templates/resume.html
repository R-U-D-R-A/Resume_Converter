<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>BytePX Resume Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='resume.css') }}">
</head>
<body>

<header>
    <h1>BytePX Resume Converter</h1>
    <div class="subtitle">Upload resume → Auto-fill → Generate PPT</div>
</header>

<section class="upload-box">
    <input type="file" id="resumeFile" accept=".pdf,.doc,.docx" />
    <button type="button" id="uploadBtn">Upload & Parse</button>
    <div id="uploadStatus" class="status"></div>
</section>

<main class="container">

<!-- PERSONAL -->
<section class="box">
    <h2>Personal Information</h2>

    <label>Name</label>
    <input id="name" type="text">

    <label>Designation</label>
    <input id="designation" type="text">

    <label>Years of Experience</label>
    <input id="years" type="text">

    <label>Forte</label>
    <input id="forte" type="text">
    <input id="forte1" type="text">

    <label>Description</label>
    <textarea id="description"></textarea>
</section>

<!-- PROJECT 1 -->
<section class="box">
    <h2>Project 1</h2>

    <input id="p1_title" type="text">
    <textarea id="p1_desc"></textarea>

    <input id="p1_resp0" type="text">
    <input id="p1_resp1" type="text">
    <input id="p1_resp2" type="text">
    <input id="p1_resp3" type="text">
    <input id="p1_resp4" type="text">
</section>

<!-- PROJECT 2 -->
<section class="box">
    <h2>Project 2</h2>

    <input id="p2_title" type="text">
    <textarea id="p2_desc"></textarea>

    <input id="p2_resp0" type="text">
    <input id="p2_resp1" type="text">
    <input id="p2_resp2" type="text">
    <input id="p2_resp3" type="text">
    <input id="p2_resp4" type="text">
</section>

<!-- PROJECT 3 -->
<section class="box">
    <h2>Project 3</h2>

    <input id="p3_title" type="text">
    <textarea id="p3_desc"></textarea>

    <input id="p3_resp0" type="text">
    <input id="p3_resp1" type="text">
    <input id="p3_resp2" type="text">
    <input id="p3_resp3" type="text">
    <input id="p3_resp4" type="text">
</section>

<!-- SKILLS -->
<section class="box">
    <h2>Technical Skills</h2>

    <textarea id="prog"></textarea>
    <textarea id="db"></textarea>
    <textarea id="tech"></textarea>
    <textarea id="report"></textarea>
    <textarea id="misc"></textarea>
</section>

<!-- EDUCATION -->
<section class="box">
    <h2>Education</h2>

    <input id="degree" type="text">
    <input id="college" type="text">

    <h2>Certifications</h2>

    <input id="cert1" type="text">
    <input id="cert2" type="text">
    <input id="cert3" type="text">
    <input id="cert4" type="text">
    <input id="cert5" type="text">
    <input id="cert6" type="text">
    <input id="cert7" type="text">
    <input id="cert8" type="text">
    <input id="cert9" type="text">
    <input id="cert10" type="text">
</section>

</main>

<div class="actions">
    <button id="generateBtn">Generate PPTX</button>
    <div id="status" class="status"></div>
</div>

<!-- JSZip -->
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<!-- SCRIPT -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
